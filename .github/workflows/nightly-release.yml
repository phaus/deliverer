name: Nightly Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Nightly Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: dhcp-server-nightly-linux
            extension: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: dhcp-server-nightly-macos
            extension: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: dhcp-server-nightly-windows
            extension: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          target: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release
        working-directory: dhcp-server

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            copy dhcp-server\\target\\release\\dhcp-server.exe artifacts\\
            powershell Compress-Archive -Path artifacts\\* -DestinationPath ${{ matrix.artifact_name }}.${{ matrix.extension }}
          else
            cp dhcp-server/target/release/dhcp-server artifacts/
            tar -czf ${{ matrix.artifact_name }}.${{ matrix.extension }} artifacts/
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build
          files: ${{ matrix.artifact_name }}.${{ matrix.extension }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
