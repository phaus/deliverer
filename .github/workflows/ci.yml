name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        target: ${{ matrix.target }}

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          dhcp-server/**/*

    - name: Build
      run: cargo build --release
      working-directory: dhcp-server

    - name: Run Mock Client Test
      run: |
        # Start server in background on a non-privileged port
        # Using 'cargo run' from within dhcp-server directory
        cargo run --release --bin dhcp-server -- 1067 &
        SERVER_PID=$!
        # Give it time to bind to the port
        sleep 5
        # Run the python test client from the root
        # Note: Since we are in dhcp-server, we go up one level
        python3 ../test_client.py 1067
        kill $SERVER_PID
      working-directory: dhcp-server
      shell: bash
