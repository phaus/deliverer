name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        target: ${{ matrix.target }}

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --manifest-path dhcp-server/Cargo.toml --release
      working-directory: dhcp-server

    - name: Run Mock Client Test
      run: |
        # Start server in background on a non-privileged port
        cargo run --manifest-path dhcp-server/Cargo.toml --bin dhcp-server 1067 &
        SERVER_PID=$!
        sleep 5
        # Run the python test client (assuming python is available)
        python3 ../test_client.py
        kill $SERVER_PID
      working-directory: dhcp-server
      shell: bash
